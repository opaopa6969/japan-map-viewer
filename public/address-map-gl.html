<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>tetsugo — 住所/エラー マップ (MapLibre + deck.gl)</title>

<!-- 地図(MapLibre・トークン不要) + データ層(deck.gl)。Mini Tokyo 3D と同じ2階建て。 -->
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/deck.gl@9.0.36/dist.min.js"></script>

<style>
  :root { color-scheme: dark; --bg:#0e1116; --panel:#1a1f29; --border:#2c3340;
          --text:#dce1e8; --muted:#8b93a1; --accent:#4e79a7; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif; overflow: hidden; }
  #app { display: grid; grid-template-columns: 280px 1fr; height: 100%; }
  #side { background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; padding: 12px; }
  #side h1 { font-size: 15px; margin: 0 0 2px; }
  #side .sub { font-size: 11px; color: var(--muted); margin: 0 0 12px; line-height: 1.5; }
  .group { margin-bottom: 16px; }
  .group > h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 0 0 6px; }
  .row { display: flex; align-items: center; gap: 8px; padding: 3px 0; font-size: 13px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex: 0 0 auto; }
  .count { margin-left: auto; color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
  .chk { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
  .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; width: 100%; }
  .seg button { flex: 1; background: var(--bg); color: var(--text); border: 0; padding: 6px 8px; cursor: pointer; font: inherit; font-size: 12px; }
  .seg button.active { background: var(--accent); color: #fff; }
  select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 8px; font: inherit; }
  #main { position: relative; }
  #map { position: absolute; inset: 0; }
  #status { position: absolute; left: 10px; bottom: 10px; z-index: 5; background: rgba(16,20,28,.78);
    border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 12px; color: var(--muted); }
  #tip { position: absolute; z-index: 6; pointer-events: none; background: rgba(16,20,28,.92);
    border: 1px solid var(--border); border-radius: 6px; padding: 6px 9px; font-size: 12px; max-width: 260px;
    display: none; line-height: 1.5; }
  #tip b { color: var(--text); }
  #tip .k { color: var(--muted); }
  a.back { color: var(--muted); font-size: 12px; text-decoration: none; }
  a.back:hover { color: var(--text); }
</style>
</head>
<body>
<div id="app">
  <aside id="side">
    <h1>住所/エラー マップ</h1>
    <p class="sub">MapLibre + deck.gl 版。<br>コア: <code>mapcore/renderer-deck.js</code>。自前2D/3D実装（<a class="back" href="/address-map">/address-map</a>）と並存。</p>

    <div class="group">
      <h2>表示モード</h2>
      <div class="seg" id="mode">
        <button data-mode="points" class="active">点群</button>
        <button data-mode="hex">集約(3D)</button>
        <button data-mode="heat">ヒート</button>
      </div>
    </div>

    <div class="group">
      <h2>ベース地図</h2>
      <div class="seg" id="base">
        <button data-base="dark" class="active">ダーク</button>
        <button data-base="gsi">地理院</button>
      </div>
    </div>

    <div class="group" id="cats">
      <h2>カテゴリ <span id="catAll" style="float:right;font-weight:400;text-transform:none;letter-spacing:0;cursor:pointer;color:var(--accent)">全ON/全OFF</span></h2>
    </div>

    <div class="group">
      <h2>地域コロプレス</h2>
      <select id="choro">
        <option value="none">なし</option>
        <optgroup label="都道府県">
          <option value="pref-vacancy">空き家率 (estat)</option>
          <option value="pref-errors">エラー件数（カテゴリ連動）</option>
        </optgroup>
        <optgroup label="市区町村">
          <option value="muni-vacancy">空き家率 (estat)</option>
          <option value="muni-errors">エラー件数（カテゴリ連動）</option>
        </optgroup>
        <optgroup label="地価（平均・地価公示）">
          <option value="pref-landprice">都道府県・平均地価</option>
          <option value="muni-landprice">市区町村・平均地価</option>
        </optgroup>
      </select>
      <div id="choroLegend" style="margin-top:8px"></div>
    </div>

    <div class="group">
      <h2>演出</h2>
      <label class="row chk"><input type="checkbox" id="anim" checked><span>アンビエント（点が呼吸する）</span></label>
      <label class="row chk"><input type="checkbox" id="kanji" checked><span>地名を日本語(漢字)で表示</span></label>
    </div>
  </aside>

  <main id="main">
    <div id="map"></div>
    <div id="status">読み込み中…</div>
    <div id="tip"></div>
  </main>
</div>

<script type="module">
import { createMapModel } from '/js/mapcore/model.js';
import { createRendererDeck } from '/js/mapcore/renderer-deck.js';
import { createPrefectureIndex } from '/js/mapcore/prefectures.js';
import { createMunicipalityIndex } from '/js/mapcore/municipalities.js';
import { vacancyByPrefecture, vacancyByMunicipality, meanByRegion, createRampLegend } from '/js/mapcore/metrics.js';

const SRC = new URLSearchParams(location.search).get('src') || '/api/address-points';
const $ = (id) => document.getElementById(id);
const tip = $('tip');

let model = null;
let renderer = null;
let choroMode = 'none';       // none | pref-* | muni-*
let curChoro = null;          // 現在の setChoropleth 設定（tooltip 用に参照）

// mapcore 地域資産（遅延ロード）
let estatCache = null;
let landPoints = null;                             // 地価公示 点群 [{lat,lon,yen}]
const region = { pref: null, muni: null };        // { index, vacancy, landprice? }

// 指標メタ: 表示名と値フォーマット（凡例・ツールチップ共用）。ここに1行足せば指標が増える。
const METRIC = {
  vacancy:   { label: '空き家率',   fmt: (v) => `${(v * 100).toFixed(1)}%` },
  landprice: { label: '平均地価',   fmt: (v) => `${(v / 10000).toFixed(1)}万円/m²` },
  errors:    { label: 'エラー件数', fmt: (v) => `${Math.round(v)}件` },
};

async function ensureLand() {
  if (landPoints) return true;
  try { landPoints = (await (await fetch('/data/land-prices.json')).json()).points || []; return true; }
  catch (e) { console.warn('land-prices ロード失敗', e); return false; }
}

// ---- ツールチップ（renderer の onPick から呼ばれる） ----------------------
function onPick(object, pos, info) {
  if (!object || !info || (info.layer && info.layer.id === 'heat')) { tip.style.display = 'none'; return; }
  const id = info.layer && info.layer.id;
  let html;
  if (id === 'choro') {
    let valStr = '—';
    if (curChoro.kind === 'metric') {
      const v = curChoro.values.get(object.properties.id);
      valStr = (v == null) ? '—' : curChoro.fmt(v);
    } else if (model) {
      const cell = model.regionAggregate(curChoro.index).get(object.properties.id);
      valStr = curChoro.fmt(cell ? cell.count : 0);
    }
    html = `<b>${object.properties.name}</b><div class="k">${curChoro.label}: ${valStr}</div>`;
  } else if (id === 'hex') {
    html = `<b>${object.points.length} 点</b><div class="k">この六角形の集約件数</div>`;
  } else {
    const cat = model.catByKey.get(object.category);
    html = `<b>${object.label || object.id}</b>`
      + `<div class="k">${cat ? cat.label : object.category}</div>`
      + (object.props ? `<div class="k">${object.props.pref || ''} ${object.props.city || ''} ${object.props.zip || ''}</div>` : '');
  }
  tip.innerHTML = html;
  tip.style.display = 'block';
  tip.style.left = (pos.x + 12) + 'px';
  tip.style.top = (pos.y + 12) + 'px';
}

function updateStatus() {
  const n = model.visible().length;
  $('status').textContent = `${n.toLocaleString()} 点表示 / 全 ${model.points.length.toLocaleString()} 点`;
}

// ---- カテゴリ UI（model.filter を直接操作） -------------------------------
function buildCategoryUI() {
  const box = $('cats');
  const counts = model.counts();
  for (const c of model.categories) {
    const row = document.createElement('label');
    row.className = 'row chk';
    row.innerHTML =
      `<input type="checkbox" checked data-cat="${c.key}">`
      + `<span class="legend-dot" style="background:${c.color}"></span>`
      + `<span>${c.label}</span>`
      + `<span class="count">${(counts[c.key] || 0).toLocaleString()}</span>`;
    row.querySelector('input').addEventListener('change', (e) => {
      if (e.target.checked) model.filter.categories.add(c.key); else model.filter.categories.delete(c.key);
      renderer.refresh(); updateStatus(); if (choroMode.endsWith('errors')) updateChoroLegend();
    });
    box.appendChild(row);
  }
}
$('catAll').addEventListener('click', () => {
  const boxes = [...document.querySelectorAll('#cats input[data-cat]')];
  const anyOff = boxes.some((b) => !b.checked);
  boxes.forEach((b) => {
    b.checked = anyOff;
    if (anyOff) model.filter.categories.add(b.dataset.cat); else model.filter.categories.delete(b.dataset.cat);
  });
  renderer.refresh(); updateStatus(); if (choroMode.endsWith('errors')) updateChoroLegend();
});

// ---- コロプレス -----------------------------------------------------------
async function ensureRegion(kind) { // 'pref' | 'muni'
  if (region[kind]) return true;
  $('status').textContent = `${kind === 'muni' ? '市区町村' : '都道府県'}ポリゴン読み込み中…`;
  try {
    const file = kind === 'muni' ? 'japan-municipalities.json' : 'japan-prefectures.json';
    const data = await (await fetch(`/data/${file}`)).json();
    const index = kind === 'muni' ? createMunicipalityIndex(data) : createPrefectureIndex(data);
    const vacancy = kind === 'muni' ? vacancyByMunicipality(estatCache) : vacancyByPrefecture(estatCache);
    region[kind] = { index, vacancy };
    return true;
  } catch (e) { console.warn(`${kind} ロード失敗`, e); return false; }
}

async function choroConfig() {
  if (choroMode === 'none') return null;
  const [gran, metric] = choroMode.split('-');
  const r = region[gran];
  if (!r) return null;
  const meta = METRIC[metric];
  const base = { index: r.index, label: meta.label, fmt: meta.fmt };
  if (metric === 'errors') return { ...base, kind: 'errors' };
  if (metric === 'vacancy') return { ...base, kind: 'metric', values: r.vacancy.values, max: r.vacancy.max };
  if (metric === 'landprice') {
    if (!r.landprice) {
      if (!await ensureLand()) return null;
      r.landprice = meanByRegion(landPoints, r.index, (p) => p.yen); // 地域平均地価
    }
    return { ...base, kind: 'metric', values: r.landprice.values, max: r.landprice.max };
  }
  return null;
}

function updateChoroLegend() {
  const box = $('choroLegend');
  box.innerHTML = '';
  if (choroMode === 'none' || !curChoro) return;
  const max = curChoro.kind === 'metric'
    ? curChoro.max
    : (model.regionAggregate(curChoro.index).max || 1);
  box.appendChild(createRampLegend(document, { max, label: curChoro.label, fmt: curChoro.fmt }));
}

$('choro').addEventListener('change', async (e) => {
  choroMode = e.target.value;
  if (choroMode !== 'none') {
    const gran = choroMode.split('-')[0];
    const ok = await ensureRegion(gran);
    if (!ok) { $('status').textContent = '地域データの読み込みに失敗'; return; }
  }
  curChoro = await choroConfig();
  renderer.setChoropleth(curChoro);
  updateChoroLegend();
  updateStatus();
});

// ---- 各種トグル → renderer メソッド ---------------------------------------
$('mode').addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  document.querySelectorAll('#mode button').forEach((x) => x.classList.remove('active'));
  b.classList.add('active'); renderer.setMode(b.dataset.mode);
});
$('base').addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  document.querySelectorAll('#base button').forEach((x) => x.classList.remove('active'));
  b.classList.add('active'); renderer.setBase(b.dataset.base);
});
$('anim').addEventListener('change', (e) => renderer.setAnim(e.target.checked));
$('kanji').addEventListener('change', (e) => renderer.setKanji(e.target.checked));

// ---- データ読み込み → model → renderer ------------------------------------
(async () => {
  let data;
  try {
    const res = await fetch(SRC);
    if (!res.ok) throw new Error(res.status);
    data = await res.json();
  } catch (err) {
    try { data = await (await fetch('/data/sample-error-points.json')).json(); }
    catch (e2) { $('status').textContent = '読み込み失敗: ' + err; return; }
  }
  data.categories = data.categories || [];
  data.points = (data.points || []).filter((p) => Number.isFinite(p.lat) && Number.isFinite(p.lon));

  model = createMapModel(data);
  renderer = createRendererDeck($('map'), { model, onPick });

  buildCategoryUI();
  updateStatus();

  // estat は起動時に取得（コロプレス選択時に pref/muni へ集約して再利用）。
  try { estatCache = await (await fetch('/data/estat-vacancy.json')).json(); }
  catch (e) { console.warn('estat 未ロード（空き家率コロプレスは不可）', e); }
})();
</script>
</body>
</html>
